name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: rust

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: claw
  CRATE_NAME: rusty-claude-cli

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            asset_suffix: linux-x86_64
            binary_name: claw
          - label: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            asset_suffix: linux-arm64
            binary_name: claw
          - label: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            asset_suffix: macos-x86_64
            binary_name: claw
          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            asset_suffix: macos-arm64
            binary_name: claw
          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            asset_suffix: windows-x86_64
            binary_name: claw.exe

    steps:
      - uses: actions/checkout@v5

      - name: Set release version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="snapshot-${GITHUB_SHA::7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "archive_name=claw-${version}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=claw-${version}-${{ matrix.asset_suffix }}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Prepare package layout
        shell: bash
        run: |
          mkdir -p "dist/${{ steps.meta.outputs.bundle_dir }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ steps.meta.outputs.bundle_dir }}/${{ matrix.binary_name }}"
          cat > "dist/${{ steps.meta.outputs.bundle_dir }}/README.txt" <<EOF
          Claw Code binary bundle

          Version: ${{ steps.meta.outputs.version }}
          Target: ${{ matrix.target }}

          Contents:
          - ${{ matrix.binary_name }}

          Usage:
          - Linux/macOS: ./claw --help
          - Windows: .\\claw.exe --help

          Notes:
          - Built from GitHub Actions.
          - Configure your provider credentials before running model requests.
          EOF

      - name: Create tar.gz archive
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -C dist -czf "release-assets/${{ steps.meta.outputs.archive_name }}" "${{ steps.meta.outputs.bundle_dir }}"

      - name: Create zip archive
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null
          Compress-Archive -Path "dist/${{ steps.meta.outputs.bundle_dir }}" -DestinationPath "release-assets/${{ steps.meta.outputs.archive_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.asset_suffix }}
          path: release-assets/${{ steps.meta.outputs.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Automated multi-platform binary packages"

      - name: Upload archives to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          find release-assets -type f -print0 | xargs -0 gh release upload "$tag" --clobber
